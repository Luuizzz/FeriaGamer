<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CampusApp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- BARRA SUPERIOR -->
  <header class="topbar">
    <h1 class="logo">Campus<span>App</span></h1>
  </header>

  <!-- VISTA INICIO: feed -->
  <main id="vista-inicio" class="vista activa">
    <div class="feed" id="feed"></div>
  </main>

  <!-- VISTA BUSCAR: perfiles del mini-reto -->
  <main id="vista-buscar" class="vista">
    <div class="seccion-buscar">
      <input
        class="input-buscar"
        type="text"
        placeholder="Buscar usuario..."
        oninput="buscarPerfil(this.value)"
      />
      <div id="resultados-buscar"></div>
    </div>
  </main>

  <!-- VISTA PERFIL: perfil de Valentina -->
  <main id="vista-perfil" class="vista">
    <div id="perfil-valentina"></div>
  </main>

  <!-- PANEL DE ESTADO -->
  <div class="estado-panel">
    <h2 class="estado-titulo">Estado del juego</h2>
    <div class="estado-fila">
      <span>Evidencia</span>
      <div class="barra"><div class="barra-fill verde" id="barra-ev"></div></div>
      <span id="val-ev">0/3</span>
    </div>
    <div class="estado-fila">
      <span>Confianza Camila</span>
      <div class="barra"><div class="barra-fill rosado" id="barra-cc"></div></div>
      <span id="val-cc">1/3</span>
    </div>
    <div class="estado-fila">
      <span>Escena</span>
      <span id="val-escena">1 — Entrada campus</span>
    </div>
  </div>

  <!-- PANEL JSON -->
<div class="json-panel">
  <a id="btn-exportar" class="btn-exportar">
    <i class="fa-solid fa-download"></i> Descargar game_state.json
  </a>
</div>

  <!-- CONTROL DE ESCENAS -->
  <div class="barra-escenas">
    <span class="escena-label">Cambiar escena:</span>
    <button class="btn-escena activa" id="btn-e1" onclick="cambiarEscena(1)">1 — Entrada</button>
    <button class="btn-escena" id="btn-e2" onclick="cambiarEscena(2)">2 — Escala</button>
    <button class="btn-escena" id="btn-e3" onclick="cambiarEscena(3)">3 — Atacada</button>
  </div>

  <!-- NAV BAR -->
  <nav class="nav-bar">
    <button class="nav-item activo-nav" id="nav-inicio" onclick="cambiarVista('inicio', this)">
      <i class="fa-solid fa-house"></i>
      <span>Inicio</span>
    </button>
    <button class="nav-item" id="nav-buscar" onclick="cambiarVista('buscar', this)">
      <i class="fa-solid fa-magnifying-glass"></i>
      <span>Buscar</span>
    </button>
    <button class="nav-item" id="nav-perfil" onclick="cambiarVista('perfil', this)">
      <i class="fa-regular fa-user"></i>
      <span>Perfil</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
